<!DOCTYPE html>
<html lang="en" id="highlights-page" style="height: 100%; overflow: hidden;">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Highlights</title>
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="reader.css">
	<script src="browser-polyfill.min.js"></script>
</head>
<body style="height: 100%; overflow: hidden;">
	<div id="highlights">
		<div id="highlights-container">
			<div id="highlights-sidebar" class="sidebar">
				<div id="highlights-sidebar-title">
					<svg xmlns="http://www.w3.org/2000/svg" class="logo" fill="none" viewBox="0 0 24 24">
						<path d="M19.3 9.838c-2.677-1.366-5.467-1.56-8.316-.607-1.738.58-3.197 1.58-4.267 3.088-1.031 1.452-1.45 3.071-1.184 4.837.268 1.781 1.164 3.228 2.505 4.4C9.96 23.231 12.24 23.942 15.092 24c.41-.053 1.157-.103 1.883-.255 2.004-.418 3.754-1.325 5.08-2.915 1.621-1.942 2.108-4.148 1.272-6.562-.704-2.034-2.138-3.467-4.027-4.43ZM7.515 6.295c.507-2.162-.88-4.664-2.988-5.37-1.106-.37-2.156-.267-3.075.492C.61 2.114.294 3.064.271 4.146c.009.135.016.285.029.435.01.102.021.205.042.305.351 1.703 1.262 2.98 2.9 3.636 1.912.766 3.808-.244 4.273-2.227Zm4.064-1.146c1.075.377 2.152.31 3.22-.033.94-.3 1.755-.793 2.341-1.609.803-1.117.5-2.387-.717-3.027-.6-.317-1.246-.438-1.927-.48-.47.076-.95.117-1.41.234-1.068.27-2.002.781-2.653 1.7-.495.697-.64 1.45-.174 2.227.303.504.779.799 1.32.988Z"/></svg>
					<span data-i18n="highlights">Highlights</span>
					<a href="settings.html" id="highlights-settings-link" class="clickable-icon" data-i18n-title="settings">
						<i data-lucide="settings"></i>
					</a>
				</div>
				<div class="highlights-search-container">
					<input type="text" id="highlights-search" data-i18n="searchHighlightsPlaceholder" placeholder="Search highlights…" autocomplete="off" spellcheck="false" />
					<div class="menu-btn">
						<button type="button" id="highlights-sort-btn" class="menu-toggle clickable-icon" data-i18n-title="sort">
							<i data-lucide="ellipsis"></i>
						</button>
						<div id="highlights-sort-menu" class="menu">
							<div class="menu-item" data-sort="az">
								<div class="menu-item-title" data-i18n="sortAZ">A to Z</div>
								<div class="menu-item-icon"><i data-lucide="check"></i></div>
							</div>
							<div class="menu-item" data-sort="za">
								<div class="menu-item-title" data-i18n="sortZA">Z to A</div>
								<div class="menu-item-icon"><i data-lucide="check"></i></div>
							</div>
							<div class="menu-item" data-sort="new">
								<div class="menu-item-title" data-i18n="sortNewOld">Newest first</div>
								<div class="menu-item-icon"><i data-lucide="check"></i></div>
							</div>
							<div class="menu-item" data-sort="old">
								<div class="menu-item-title" data-i18n="sortOldNew">Oldest first</div>
								<div class="menu-item-icon"><i data-lucide="check"></i></div>
							</div>
						</div>
					</div>
				</div>
				<ul id="highlights-domain-list"></ul>
			</div>
			<div id="highlights-main">
				<div id="highlights-navbar">
					<div id="highlights-navbar-title">
						<svg xmlns="http://www.w3.org/2000/svg" class="logo" fill="none" viewBox="0 0 24 24">
							<path d="M19.3 9.838c-2.677-1.366-5.467-1.56-8.316-.607-1.738.58-3.197 1.58-4.267 3.088-1.031 1.452-1.45 3.071-1.184 4.837.268 1.781 1.164 3.228 2.505 4.4C9.96 23.231 12.24 23.942 15.092 24c.41-.053 1.157-.103 1.883-.255 2.004-.418 3.754-1.325 5.08-2.915 1.621-1.942 2.108-4.148 1.272-6.562-.704-2.034-2.138-3.467-4.027-4.43ZM7.515 6.295c.507-2.162-.88-4.664-2.988-5.37-1.106-.37-2.156-.267-3.075.492C.61 2.114.294 3.064.271 4.146c.009.135.016.285.029.435.01.102.021.205.042.305.351 1.703 1.262 2.98 2.9 3.636 1.912.766 3.808-.244 4.273-2.227Zm4.064-1.146c1.075.377 2.152.31 3.22-.033.94-.3 1.755-.793 2.341-1.609.803-1.117.5-2.387-.717-3.027-.6-.317-1.246-.438-1.927-.48-.47.076-.95.117-1.41.234-1.068.27-2.002.781-2.653 1.7-.495.697-.64 1.45-.174 2.227.303.504.779.799 1.32.988Z"/></svg>
						<span data-i18n="highlights">Highlights</span>
					</div>
					<button id="highlights-hamburger" class="hamburger-menu clickable-icon">
						<span class="hamburger-icon"></span>
					</button>
				</div>
				<div id="highlights-main-header">
					<div id="highlights-breadcrumb"></div>
					<div class="highlights-main-actions">
						<button type="button" id="export-context-btn" data-i18n="export">Export</button>
						<button type="button" id="delete-context-btn" class="mod-warning" data-i18n="delete">Delete</button>
					</div>
				</div>
				<div id="highlights-scroll">
					<div id="highlights-list"></div>
					<div id="highlights-empty" class="highlights-empty" style="display:none;">
						<p data-i18n="noResults">No results found</p>
					</div>
					<div id="highlights-sentinel"></div>
				</div>
			</div>
		</div>
	</div>
	<script type="module" src="highlights.js"></script>
</body>
</html>
